    <meta charset="UTF-8">

    <title>Quick Quiz — Al-Jazari Education</title>
    <meta name="description" content="Practice Lab — Test your mechanical engineering knowledge with quick quizzes, and prepare for real technical interviews with our Interview Simulator. Machining, sheet metal, plastics, FEA, materials, and more.">
    <meta name="keywords" content="mechanical engineering quiz, design for manufacturing, DFM, machining quiz, sheet metal quiz, plastics quiz, FEA quiz, engineering test">
    <meta property="og:title" content="Quick Quiz — Al-Jazari Education">
    <meta property="og:description" content="Real-world mechanical design — is your design shop-floor ready? Test yourself across 10 manufacturing topics.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://aljazariedu.com/quiz.html">
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #294D66;
            --teal-dark: #1E3A4E;
            --teal-light: #3A6A8A;
            --teal-glow: rgba(41, 77, 102, 0.2);
            --orange: #E8632B;
            --orange-dark: #C4511F;
            --orange-light: #F2874D;
            --orange-glow: rgba(232, 99, 43, 0.12);
            --bg: #0A0F14;
            --bg-card: #111920;
            --bg-card-hover: #162029;
            --text: #E8ECF0;
            --text-dim: #8A9BAE;
            --text-muted: #5A6B7E;
            --border: #1E2A36;
            --border-light: #2A3A4A;
            --success: #2ECC71;
            --error: #E74C3C;
            --correct-bg: rgba(46, 204, 113, 0.08);
            --wrong-bg: rgba(231, 76, 60, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .grid-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== NAV ===== */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: rgba(10, 15, 20, 0.85);
            border-bottom: 1px solid var(--border);
            transition: transform 0.3s ease;
        }

        nav.nav-hidden { transform: translateY(-100%); }

        .nav-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem;
            color: var(--teal-light);
            text-decoration: none;
            letter-spacing: -0.02em;
        }
        .nav-logo span { color: var(--orange); }

        .nav-links { display: flex; gap: 2rem; align-items: center; }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--teal-light); }

        .nav-login {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.3s;
            padding: 0.4rem 1rem;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            cursor: pointer;
            background: none;
            font-family: 'IBM Plex Sans', sans-serif;
        }
        .nav-login:hover { color: var(--teal-light); border-color: var(--teal); }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .nav-user-name {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--teal-light);
            letter-spacing: 0.02em;
        }
        .nav-logout {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: all 0.3s;
            padding: 0.3rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 5px;
            cursor: pointer;
            background: none;
            font-family: 'IBM Plex Sans', sans-serif;
        }
        .nav-logout:hover { color: var(--error); border-color: var(--error); }

        /* ===== SECTIONS ===== */
        section { position: relative; z-index: 1; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1rem;
            color: var(--orange);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            display: block;
        }

        /* ===== LEADERBOARD PANEL (Top, Collapsible) ===== */
        .leaderboard-section {
            padding-top: 5rem;
            padding-bottom: 1.5rem;
            transition: all 0.4s ease;
        }

        .leaderboard-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .leaderboard-header:hover { background: var(--bg-card-hover); }

        .leaderboard-header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .leaderboard-title {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: var(--orange);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .leaderboard-title svg { width: 14px; height: 14px; }

        .leaderboard-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.25rem;
            display: flex;
            align-items: center;
            transition: transform 0.3s, color 0.3s;
        }
        .leaderboard-toggle:hover { color: var(--text-dim); }
        .leaderboard-toggle svg { width: 16px; height: 16px; }
        .leaderboard-toggle.collapsed { transform: rotate(180deg); }

        .leaderboard-body {
            max-height: 320px;
            overflow-y: auto;
            padding: 0 1.5rem 1.25rem;
            transition: max-height 0.4s ease, padding 0.4s ease, opacity 0.3s ease;
        }

        .leaderboard-body.collapsed {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
            overflow: hidden;
        }

        .leaderboard-body::-webkit-scrollbar { width: 4px; }
        .leaderboard-body::-webkit-scrollbar-track { background: transparent; }
        .leaderboard-body::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

        .leaderboard-table { width: 100%; border-collapse: collapse; }

        .leaderboard-table thead th {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.4rem 0.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-weight: 500;
        }
        .leaderboard-table thead th:nth-child(1) { width: 28px; text-align: center; }
        .leaderboard-table thead th:nth-child(3) { text-align: center; width: 44px; }

        .leaderboard-table tbody tr { transition: background 0.2s; }
        .leaderboard-table tbody tr:hover { background: var(--bg-card-hover); }

        .leaderboard-table tbody td {
            padding: 0.5rem 0.5rem;
            font-size: 0.82rem;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            font-weight: 300;
        }
        .leaderboard-table tbody td:nth-child(1) {
            text-align: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .leaderboard-table tbody td:nth-child(3) {
            text-align: center;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
        }
        .leaderboard-table tbody tr:nth-child(1) td:nth-child(1) { color: var(--orange); }
        .leaderboard-table tbody tr:nth-child(2) td:nth-child(1) { color: var(--teal-light); }
        .leaderboard-table tbody tr:nth-child(3) td:nth-child(1) { color: var(--teal-light); }

        .leaderboard-topics {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.4;
            display: block;
            margin-top: 0.15rem;
        }
        .leaderboard-empty, .leaderboard-loading {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 300;
        }
        .leaderboard-loading { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; }

        /* ===== QUIZ SECTION ===== */
        #quiz-section {
            padding: 1.5rem 0 3rem;
            padding-top: 5rem;
        }

        /* ===== IMMERSIVE QUIZ MODE ===== */
        body.quiz-active {
            overflow: hidden;
        }
        body.quiz-active nav,
        body.quiz-active footer,
        body.quiz-active .leaderboard-section,
        body.quiz-active .quiz-header,
        body.quiz-active #quizStart {
            display: none !important;
        }
        body.quiz-active #quiz-section {
            padding-top: 0;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .quiz-header h2 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.6rem, 3vw, 2.2rem);
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        .quiz-header p {
            color: var(--text-dim);
            font-size: 0.95rem;
            max-width: 520px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* ===== START SCREEN ===== */
        #quizStart { text-align: center; padding: 2rem 0; }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 2.5rem;
            background: var(--teal);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .hero-cta:hover {
            background: var(--teal-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(13, 115, 119, 0.3);
        }
        .hero-cta svg { width: 18px; height: 18px; transition: transform 0.3s; }
        .hero-cta:hover svg { transform: translateX(4px); }

        /* ===== QUIZ ACTIVE LAYOUT — FULL VIEWPORT, NO SCROLL ===== */
        .quiz-active-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 1rem 2rem;
            overflow: hidden;
        }

        /* Top bar: progress + topic + score + exit */
        .quiz-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            flex-shrink: 0;
        }
        .quiz-bar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .quiz-exit {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .quiz-exit:hover {
            border-color: var(--error);
            color: var(--error);
        }

        /* Main content area: question (+ optional SVG) — fixed height */
        .quiz-top-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-items: stretch;
            height: 55vh;
            flex-shrink: 0;
        }

        /* When no SVG, question centers itself */
        .quiz-top-row.no-svg {
            grid-template-columns: 1fr;
            max-width: 750px;
            margin: 0 auto;
            width: 100%;
        }

        /* SVG illustration panel */
        .svg-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .svg-panel svg {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        /* Question area */
        .question-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .q-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .q-counter {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .q-score {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: var(--teal-light);
        }

        .q-topic-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.25rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border-light);
            border-radius: 100px;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            width: fit-content;
        }
        .q-topic-badge .topic-emoji { font-size: 0.85rem; }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: var(--border);
            border-radius: 3px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--teal), var(--orange));
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .q-text {
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            list-style: none;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 0.7rem 1rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.88rem;
            font-family: 'IBM Plex Sans', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            line-height: 1.4;
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--teal);
            background: var(--teal-glow);
        }

        .option-letter {
            flex-shrink: 0;
            width: 24px; height: 24px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.72rem;
            font-family: 'IBM Plex Mono', monospace;
            background: var(--border);
            color: var(--text-dim);
            transition: all 0.25s;
        }
        .option-btn:hover:not(:disabled) .option-letter { background: var(--teal); color: #fff; }

        .option-btn.correct { border-color: var(--success); background: var(--correct-bg); }
        .option-btn.correct .option-letter { background: var(--success); color: #fff; }
        .option-btn.wrong { border-color: var(--error); background: var(--wrong-bg); }
        .option-btn.wrong .option-letter { background: var(--error); color: #fff; }
        .option-btn.reveal-correct { border-color: var(--success); background: var(--correct-bg); }
        .option-btn.reveal-correct .option-letter { background: var(--success); color: #fff; }

        /* Next button - sits below options on left side */
        .next-btn-row {
            margin-top: 1rem;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            padding: 0.7rem 1.8rem;
            background: var(--teal);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'IBM Plex Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }
        .next-btn:hover { background: var(--teal-light); transform: translateY(-1px); }

        /* Explanation panel (fills remaining space below question) */
        .explanation-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-top: 0.75rem;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-light) transparent;
        }

        /* Match centered width when no SVG */
        .explanation-panel.centered {
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
            margin-top: 0.75rem;
        }

        .explanation-waiting {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.88rem;
            font-weight: 300;
            padding: 2rem 1rem;
        }
        .explanation-waiting svg { width: 32px; height: 32px; margin-bottom: 0.75rem; opacity: 0.4; }

        .explanation {
            padding: 1.25rem 1.5rem;
            border-left: 3px solid var(--orange);
            background: var(--orange-glow);
            border-radius: 0 10px 10px 0;
            font-size: 0.88rem;
            color: var(--text-dim);
            line-height: 1.7;
            animation: fadeUp 0.3s ease;
        }
        .explanation strong { color: var(--orange-light); font-weight: 600; }

        /* ===== RESULTS ===== */
        .results-card {
            text-align: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeUp 0.4s ease;
        }
        .results-score {
            font-family: 'DM Serif Display', serif;
            font-size: 3.5rem;
            margin: 1rem 0;
        }
        .results-score .correct-count { color: var(--success); }
        .results-score .total-count { color: var(--text-muted); }

        .results-msg {
            font-size: 1rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
        }
        .results-breakdown {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .results-stat { text-align: center; }
        .results-stat .num {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .results-stat .label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Nickname form */
        .nickname-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }
        .nickname-form input {
            flex: 1;
            padding: 0.7rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .nickname-form input::placeholder { color: var(--text-muted); }
        .nickname-form input:focus { border-color: var(--teal); }
        .nickname-form button {
            padding: 0.7rem 1.25rem;
            background: var(--orange);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.82rem;
            font-family: 'IBM Plex Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .nickname-form button:hover { background: var(--orange-dark); transform: translateY(-1px); }
        .nickname-form button:disabled { opacity: 0.5; cursor: default; transform: none; }
        .nickname-msg { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.5rem; text-align: center; }
        .nickname-msg.success { color: var(--success); }
        .nickname-msg.error { color: var(--error); }

        /* ===== FOOTER ===== */
        footer {
            position: relative;
            z-index: 1;
            border-top: 1px solid var(--border);
            padding: 3rem 2rem;
            text-align: center;
        }
        .footer-name {

<script>
// quizData will be populated from Firestore by the module script below
let quizData = [];
let quizDataReady = false;
window.quizData = quizData;
window.quizDataReady = false;


    // =========================================
    // QUIZ ENGINE — 10 Random Questions From All Topics
    // =========================================

    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    let activeQuestions = [];
    const QUESTIONS_PER_QUIZ = 10;

    function shuffleArray(arr) {
        const shuffled = [...arr];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    function buildQuestionPool() {
        const pool = [];
        const data = window.quizData || quizData || [];
        data.forEach(topic => {
            topic.questions.forEach(q => {
                pool.push({
                    ...q,
                    topicName: topic.name,
                    topicIcon: topic.icon
                });
            });
        });
        return pool;
    }

    function startQuiz() {
        if (!window.quizDataReady || (window.quizData || []).length === 0) {
            alert('Questions are still loading. Please wait a moment and try again.');
            return;
        }
        currentQuestion = 0;
        score = 0;
        answered = false;
        const pool = buildQuestionPool();
        activeQuestions = shuffleArray(pool).slice(0, QUESTIONS_PER_QUIZ);

        // Enter immersive quiz mode — hides nav, footer, leaderboard, header
        document.body.classList.add('quiz-active');
        document.getElementById('activeQuiz').classList.remove('hidden');

        renderQuestion();
    }

    function renderQuestion() {
        answered = false;
        const q = activeQuestions[currentQuestion];
        const total = activeQuestions.length;
        const letters = ['A', 'B', 'C', 'D'];

        const hasSvg = q.svgCode && q.svgCode.trim().length > 0;
        const svgHtml = hasSvg
            ? `<div class="svg-panel">${q.svgCode}</div>`
            : '';
        const topRowClass = hasSvg ? 'quiz-top-row' : 'quiz-top-row no-svg';
        const explClass = hasSvg ? 'explanation-panel' : 'explanation-panel centered';

        document.getElementById('activeQuiz').innerHTML = `
            <div class="quiz-active-layout">
                <div class="quiz-bar">
                    <div class="quiz-bar-left">
                        <span class="q-counter">Question ${currentQuestion + 1} / ${total}</span>
                        <div class="q-topic-badge">
                            <span class="topic-emoji">${q.topicIcon}</span>
                            ${q.topicName}
                        </div>
                    </div>
                    <div class="quiz-bar-left">
                        <span class="q-score">Score: ${score}/${currentQuestion}</span>
                        <a href="practice.html" class="quiz-exit" onclick="return confirm('Exit the quiz? Your progress will be lost.')">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                            Exit
                        </a>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${((currentQuestion) / total) * 100}%"></div>
                </div>
                <div class="${topRowClass}">
                    <div class="question-panel">
                        <div class="q-text">${q.q}</div>
                        <div class="options-list">
                            ${q.options.map((opt, i) => `
                                <button class="option-btn" onclick="selectAnswer(${i})" id="opt${i}">
                                    <span class="option-letter">${letters[i]}</span>
                                    <span>${opt}</span>
                                </button>
                            `).join('')}
                        </div>
                        <div id="nextBox"></div>
                    </div>
                    ${svgHtml}
                </div>
                <div class="${explClass} hidden" id="explanationPanel"></div>
            </div>
        `;
    }

    function selectAnswer(selected) {
        if (answered) return;
        answered = true;
        const q = activeQuestions[currentQuestion];
        const total = activeQuestions.length;
        const isCorrect = selected === q.correct;

        if (isCorrect) score++;

        document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
        document.getElementById(`opt${selected}`).classList.add(isCorrect ? 'correct' : 'wrong');
        if (!isCorrect) {
            document.getElementById(`opt${q.correct}`).classList.add('reveal-correct');
        }

        // Show explanation — gated for visitors
        document.getElementById('explanationPanel').classList.remove('hidden');
        if (isUserLoggedIn()) {
            document.getElementById('explanationPanel').innerHTML = `
                <div class="explanation" style="border-left-color: ${isCorrect ? 'var(--success)' : 'var(--error)'}; background: ${isCorrect ? 'var(--correct-bg)' : 'var(--wrong-bg)'};">
                    <strong style="color: ${isCorrect ? 'var(--success)' : 'var(--error)'};">${isCorrect ? '✓ Correct!' : '✗ Not quite.'}</strong><br>
                    ${q.explanation}
                </div>
            `;
        } else {
            document.getElementById('explanationPanel').innerHTML = `
                <div class="explanation" style="border-left-color: ${isCorrect ? 'var(--success)' : 'var(--error)'}; background: ${isCorrect ? 'var(--correct-bg)' : 'var(--wrong-bg)'}; text-align: center;">
                    <strong style="color: ${isCorrect ? 'var(--success)' : 'var(--error)'};">${isCorrect ? '✓ Correct!' : '✗ Not quite.'}</strong><br><br>
                    <span style="color: var(--text-dim);">Register for free to see full explanations and learn from each question.</span><br><br>
                    <a href="auth.html?tab=register&redirect=quiz.html" style="color: var(--orange); font-weight: 600; text-decoration: none;">Register Free →</a>
                </div>
            `;
        }

        // Show next button below options
        const isLast = currentQuestion >= total - 1;
        document.getElementById('nextBox').innerHTML = `
            <div class="next-btn-row">
                <button class="next-btn" onclick="${isLast ? 'showResults()' : 'nextQuestion()'}">
                    ${isLast ? 'See Results' : 'Next Question →'}
                </button>
            </div>
        `;

        // Scroll explanation into view
    }

    function nextQuestion() {
        currentQuestion++;
        renderQuestion();
    }

    function showResults() {
        const total = activeQuestions.length;
        const pct = Math.round((score / total) * 100);
        let msg = '';
        if (pct === 100) msg = "Perfect score! You really know your stuff.";
        else if (pct >= 70) msg = "Solid knowledge. A few areas to revisit.";
        else if (pct >= 40) msg = "Decent foundation — the explanations should help fill the gaps.";
        else msg = "Don't worry — that's exactly why this quiz exists. Review the explanations and try again.";

        const topicsCovered = [...new Set(activeQuestions.map(q => q.topicName))];
        const topicsStr = topicsCovered.join(', ');
        const dateStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

        // Save result to Firestore if logged in
        if (isUserLoggedIn() && window.ajeUser && window.ajeUser.firebaseUser) {
            try {
                const uid = window.ajeUser.firebaseUser.uid;
                const userRef = window.firebaseDoc(window.firebaseFirestore, 'users', uid);
                window.firebaseUpdateDoc(userRef, {
                    lastQuiz: {
                        score: score,
                        total: total,
                        pct: pct,
                        topics: topicsStr,
                        date: new Date().toISOString()
                    }
                });
            } catch(e) { console.error('Failed to save quiz result:', e); }
        }

        // Stay in immersive mode — full screen results
        document.getElementById('activeQuiz').innerHTML = `
            <div class="quiz-active-layout" style="justify-content: center; align-items: center;">
                <div class="results-card">
                    <span class="section-label">Quiz Complete</span>
                    <div class="results-score">
                        <span class="correct-count">${score}</span><span class="total-count"> / ${total}</span>
                    </div>
                    <p class="results-msg">${msg}</p>
                    <div class="results-breakdown">
                        <div class="results-stat">
                            <div class="num" style="color: var(--success)">${score}</div>
                            <div class="label">Correct</div>
                        </div>
                        <div class="results-stat">
                            <div class="num" style="color: var(--error)">${total - score}</div>
                            <div class="label">Wrong</div>
                        </div>
                        <div class="results-stat">
                            <div class="num" style="color: var(--teal-light)">${pct}%</div>
                            <div class="label">Score</div>
                        </div>
                        <div class="results-stat">
                            <div class="num" style="color: var(--orange)">${topicsCovered.length}</div>
                            <div class="label">Topics</div>
                        </div>
                    </div>
                    <p style="font-size: 0.78rem; color: var(--text-muted); margin-bottom: 1.5rem; font-family: 'IBM Plex Mono', monospace;">${topicsStr}</p>
                    <div class="btn-group">
                        <button class="hero-cta" onclick="startQuiz()" style="font-size:0.9rem; padding:0.8rem 1.8rem;">
                            Try Again
                        </button>
                        <a href="https://www.linkedin.com/feed/?shareActive=true&text=${encodeURIComponent('I just scored ' + score + '/' + total + ' (' + pct + '%) on the Al-Jazari Engineering Quiz covering ' + topicsStr + '.\n\nTest your mechanical engineering knowledge: https://aljazariedu.com/practice')}" target="_blank" rel="noopener" style="display:inline-flex; align-items:center; gap:0.5rem; padding:0.8rem 1.8rem; background:none; border:1px solid var(--border-light); color:var(--text-dim); text-decoration:none; font-weight:600; font-size:0.9rem; border-radius:8px; transition:all 0.3s; cursor:pointer;">
                            <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px;"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                            Share on LinkedIn
                        </a>
                        <a href="practice.html" style="display:inline-flex; align-items:center; gap:0.5rem; padding:0.8rem 1.8rem; background:none; border:1px solid var(--border); color:var(--text-muted); text-decoration:none; font-weight:600; font-size:0.9rem; border-radius:8px; transition:all 0.3s;">
                            Back to Practice Lab
                        </a>
                    </div>
                    ${isUserLoggedIn()
                        ? `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border);">
                                <p style="font-size:0.85rem; color:var(--text-dim); margin-bottom:0.75rem; font-weight:300;">Join the leaderboard</p>
                                <div class="nickname-form">
                                    <input type="text" id="nicknameInput" placeholder="Your nickname" maxlength="20">
                                    <button id="submitScoreBtn" onclick="submitScore()">Submit</button>
                                </div>
                                <p id="nicknameMsg" class="nickname-msg"></p>
                            </div>`
                        : `<div style="margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border); text-align:center;">
                                <p style="font-size:0.85rem; color:var(--text-dim); margin-bottom:0.75rem; font-weight:300;">Want to join the leaderboard and see full explanations?</p>
                                <a href="auth.html?tab=register&redirect=quiz.html" style="color: var(--orange); font-weight: 600; text-decoration: none; font-size: 0.95rem;">Register Free →</a>

        window._lastQuizScore = score;

    </script>

    <!-- FIREBASE (shared auth + leaderboard + Firestore questions) -->
    <script type="module">
        import { app, onUserReady } from './aje-auth.js';
        import { getDatabase, ref, get, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const rtdb = getDatabase(app);
        const fsdb = getFirestore(app);

        // =========================================
        // LOAD QUIZ QUESTIONS FROM FIRESTORE
        // =========================================
        async function loadQuizQuestions() {
            try {
                const snapshot = await getDocs(collection(fsdb, 'questions'));
                const questions = [];
                snapshot.forEach(doc => {
                    const d = doc.data();
                    if (d.modes && (d.modes.includes('quick') || d.modes.includes('full'))) {
                        questions.push(d);
                    }
                });

                // Group by topic to match the quizData format
                const topicMap = {};
                questions.forEach(q => {
                    const t = q.topic || 'Uncategorized';
                    if (!topicMap[t]) {
                        topicMap[t] = { name: t, icon: q.topicIcon || '', questions: [] };
                    }
                    topicMap[t].questions.push({
                        q: q.questionText,
                        options: q.options,
                        correct: q.correctAnswer,
                        explanation: q.fullExplanation,
                        svgCode: q.svgCode || ''
                    });
                });

                window.quizData = Object.values(topicMap);
                window.quizDataReady = true;

                console.log(`Loaded ${questions.length} questions across ${Object.keys(topicMap).length} topics from Firestore`);

                const startBtn = document.getElementById('quizStartBtn');
                if (startBtn) {
                    startBtn.disabled = false;
                    startBtn.innerHTML = 'Start Quiz <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:18px;height:18px;"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>';
                }
            } catch(e) {
                console.error('Failed to load questions from Firestore:', e);
                const startBtn = document.getElementById('quizStartBtn');
                if (startBtn) {
                    startBtn.textContent = 'Error Loading Questions';
                    startBtn.disabled = true;
                }
            }
        }

        loadQuizQuestions();

        // Expose to global scope for quiz engine
        window.firebaseDB = rtdb;
        window.firebaseRef = ref;
        window.firebaseGet = get;
        window.firebaseSet = set;
        window.firebaseOnValue = onValue;
        window.firebaseQuery = query;
        window.firebaseOrderByChild = orderByChild;

        // Firestore helpers for saving quiz results
        window.firebaseFirestore = fsdb;
        window.firebaseDoc = doc;
        window.firebaseUpdateDoc = updateDoc;
        window.firebaseLimitToLast = limitToLast;

        // Auth state for quiz gating
        onUserReady((user, profile) => {
            window._firebaseUser = user || null;
        });

        // Leaderboard listener
        const leaderboardRef = query(ref(rtdb, 'leaderboard'), orderByChild('score'));
        onValue(leaderboardRef, (snapshot) => {
            const data = snapshot.val();
            window.renderLeaderboard(data);
        }, (error) => {
            document.getElementById('leaderboardContent').innerHTML =
                '<div class="leaderboard-empty">Could not load leaderboard.</div>';
        });
    </script>

    <script>
    // =========================================
    // LEADERBOARD FUNCTIONS
    // =========================================

    window.renderLeaderboard = function(data) {
        const container = document.getElementById('leaderboardContent');
        if (!data) {
            container.innerHTML = '<div class="leaderboard-empty">No scores yet. Be the first!</div>';
            return;
        }

        const entries = Object.keys(data).map(key => ({
            nickname: key,
            score: data[key].score,
            topics: data[key].topics || '',
            timestamp: data[key].timestamp || 0
        }));

        entries.sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            return a.timestamp - b.timestamp;
        });

        const top10 = entries.slice(0, 10);

        let html = '<table class="leaderboard-table"><thead><tr><th>#</th><th>Player</th><th>Score</th></tr></thead><tbody>';
        top10.forEach((entry, i) => {
            html += '<tr>';
            html += '<td>' + (i + 1) + '</td>';
            html += '<td>' + escapeHtml(entry.nickname);
            if (entry.topics) {
                html += '<span class="leaderboard-topics">' + escapeHtml(entry.topics) + '</span>';
            }
            html += '</td>';
            html += '<td style="color:' + (entry.score >= 8 ? 'var(--success)' : entry.score >= 5 ? 'var(--teal-light)' : 'var(--text-dim)') + '">' + entry.score + '/10</td>';
            html += '</tr>';
        });
        html += '</tbody></table>';

        container.innerHTML = html;
    };

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    window.submitScore = function() {
        var input = document.getElementById('nicknameInput');
        var btn = document.getElementById('submitScoreBtn');
        var msgEl = document.getElementById('nicknameMsg');
        var nickname = input.value.trim();

        if (!nickname) {
            msgEl.textContent = 'Please enter a nickname.';
            msgEl.className = 'nickname-msg error';
            return;
        }

        if (nickname.length > 20) {
            msgEl.textContent = 'Nickname must be 20 characters or less.';
            msgEl.className = 'nickname-msg error';
            return;
        }

        var safeKey = nickname.replace(/[.#$\[\]\/]/g, '_');

        btn.disabled = true;
        btn.textContent = 'Saving...';
        msgEl.textContent = '';

        var dbRef = window.firebaseRef(window.firebaseDB, 'leaderboard/' + safeKey);

        window.firebaseGet(dbRef).then(function(snapshot) {
            var currentScore = window._lastQuizScore || 0;
            var currentTopics = window._lastQuizTopics || '';

            if (snapshot.exists()) {
                var existing = snapshot.val();
                if (existing.score >= currentScore) {
                    msgEl.textContent = 'You already have a higher score (' + existing.score + '/10). Keep it!';
                    msgEl.className = 'nickname-msg';
                    btn.textContent = 'Submitted';
                    return;
                }
            }

            return window.firebaseSet(dbRef, {
                score: currentScore,
                topics: currentTopics,
                timestamp: Date.now()
            }).then(function() {
                msgEl.textContent = 'Score saved to leaderboard!';
                msgEl.className = 'nickname-msg success';
                btn.textContent = 'Submitted';
            });
        }).catch(function(err) {
            console.error('Leaderboard error:', err);
            msgEl.textContent = 'Could not save score. Try again.';
            msgEl.className = 'nickname-msg error';
            btn.disabled = false;
            btn.textContent = 'Submit';
        });
    };
    </script>

    (function() {
        const nav = document.querySelector('nav');
        let lastScrollY = window.scrollY;
        let ticking = false;

        function updateNav() {
            const currentScrollY = window.scrollY;

            if (currentScrollY > lastScrollY && currentScrollY > 60) {
                nav.classList.add('nav-hidden');
            } else {
                nav.classList.remove('nav-hidden');
            }

            lastScrollY = currentScrollY;
            ticking = false;
        }

        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(updateNav);
                ticking = true;
            }
        }, { passive: true });
    })();
    </script>
</body>
</html>
