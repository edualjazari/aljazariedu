        // ============================================
        // MIGRATION FUNCTION
        // ============================================
        window.runMigration = async function() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = 'Running...';

            // Safety check — see if questions already exist
            logMsg('Checking if questions collection already has data...', 'info');
            try {
                const existing = await getDocs(collection(db, 'questions'));
                if (existing.size > 0) {
                    logMsg(`⚠️ ABORT: Found ${existing.size} existing documents in 'questions' collection.`, 'err');
                    logMsg('Delete the collection in Firebase Console first if you want to re-run.', 'err');
                    btn.textContent = 'Aborted';
                    return;
                }
            } catch(e) {
                logMsg('Collection empty or does not exist yet — proceeding.', 'info');
            }

            let total = 0;
            let success = 0;
            let errors = 0;

            for (const topic of quizData) {
                logMsg(`\n── ${topic.icon} ${topic.name} (${topic.questions.length} questions) ──`, 'info');

                for (const q of topic.questions) {
                    total++;
                    const docData = {
                        questionText: q.q,
                        options: q.options,
                        correctAnswer: q.correct,
                        fullExplanation: q.explanation,
                        topic: topic.name,
                        topicIcon: topic.icon,
                        difficulty: "medium",
                        svgCode: "",
                        modes: ["quick", "full"],
                        createdAt: new Date().toISOString()
                    };

                    try {
                        const docRef = await addDoc(collection(db, 'questions'), docData);
                        success++;
                        logMsg(`  ✓ Q${total}: "${q.q.substring(0, 60)}..." → ${docRef.id}`, 'ok');
                    } catch(e) {
                        errors++;
                        logMsg(`  ✗ Q${total}: "${q.q.substring(0, 60)}..." — ${e.message}`, 'err');
                    }
                }
            }

            logMsg(`\n${'='.repeat(50)}`, 'info');
            logMsg(`MIGRATION COMPLETE`, 'info');
            logMsg(`Total: ${total} | Success: ${success} | Errors: ${errors}`, success === total ? 'ok' : 'err');
            btn.textContent = 'Done';
        };
    </script>
