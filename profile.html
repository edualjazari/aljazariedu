<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CF6SQXJZ57"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag("js", new Date());
        gtag("config", "G-CF6SQXJZ57");
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — Al-Jazari Education</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #294D66; --teal-dark: #1E3A4E; --teal-light: #3A6A8A;
            --teal-glow: rgba(41, 77, 102, 0.2);
            --orange: #E8632B; --orange-dark: #C4511F; --orange-light: #F2874D;
            --orange-glow: rgba(232, 99, 43, 0.12);
            --bg: #0A0F14; --bg-card: #111920; --bg-card-hover: #162029;
            --text: #E8ECF0; --text-dim: #8A9BAE; --text-muted: #5A6B7E;
            --border: #1E2A36; --border-light: #2A3A4A;
            --success: #2ECC71; --error: #E74C3C;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.7; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0;
        }
        .grid-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px; opacity: 0.15; pointer-events: none; z-index: 0;
        }

        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); background: rgba(10, 15, 20, 0.85); border-bottom: 1px solid var(--border); transition: transform 0.3s ease; }
        nav.nav-hidden { transform: translateY(-100%); }
        .nav-logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--teal-light); text-decoration: none; letter-spacing: -0.02em; }
        .nav-logo span { color: var(--orange); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; transition: color 0.3s; }
        .nav-links a:hover { color: var(--teal-light); }
        .nav-login { color: var(--text-dim); font-size: 0.85rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.3s; padding: 0.4rem 1rem; border: 1px solid var(--border-light); border-radius: 6px; cursor: pointer; background: none; font-family: 'IBM Plex Sans', sans-serif; text-decoration: none; }
        .nav-login:hover { color: var(--teal-light); border-color: var(--teal); }
        .nav-user { display: flex; align-items: center; gap: 0.75rem; }
        .nav-user-name { font-size: 0.82rem; font-weight: 500; color: var(--teal-light); letter-spacing: 0.02em; text-decoration: none; }
        .nav-user-name:hover { color: var(--orange); }
        .nav-logout { color: var(--text-muted); font-size: 0.78rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.3s; padding: 0.3rem 0.75rem; border: 1px solid var(--border); border-radius: 5px; cursor: pointer; background: none; font-family: 'IBM Plex Sans', sans-serif; }
        .nav-logout:hover { color: var(--error); border-color: var(--error); }

        section { position: relative; z-index: 1; }
        .container { max-width: 700px; margin: 0 auto; padding: 0 2rem; }
        .section-label { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; color: var(--orange); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 1rem; display: block; }

        .page-header { text-align: center; padding: 8rem 2rem 2rem; }
        .page-header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(1.8rem, 3vw, 2.5rem); letter-spacing: -0.02em; margin-bottom: 0.5rem; }

        /* PROFILE CARD */
        .profile-section { padding: 2rem 0 5rem; }

        .profile-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem;
        }
        .profile-card h3 {
            font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
            color: var(--orange); text-transform: uppercase; letter-spacing: 0.12em;
            margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem;
        }

        .profile-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 0; border-bottom: 1px solid var(--border);
        }
        .profile-row:last-child { border-bottom: none; }

        .profile-row-label { font-size: 0.85rem; color: var(--text-dim); font-weight: 400; }
        .profile-row-value { font-size: 0.9rem; font-weight: 500; }

        .plan-tag {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.2rem 0.7rem; border-radius: 100px; font-size: 0.72rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
        }
        .plan-tag.free { background: var(--teal-glow); color: var(--teal-light); border: 1px solid var(--teal); }
        .plan-tag.pro { background: var(--orange-glow); color: var(--orange); border: 1px solid var(--orange); }

        .upgrade-link { font-size: 0.82rem; color: var(--orange); text-decoration: none; font-weight: 500; margin-left: 0.75rem; }
        .upgrade-link:hover { text-decoration: underline; }

        /* TOGGLE SWITCH */
        .toggle-switch { position: relative; width: 44px; height: 24px; cursor: pointer; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--border-light); border-radius: 24px; transition: 0.3s;
        }
        .toggle-slider::before {
            content: ''; position: absolute; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background: var(--text-muted);
            border-radius: 50%; transition: 0.3s;
        }
        .toggle-switch input:checked + .toggle-slider { background: var(--teal); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); background: #fff; }

        .profile-actions { margin-top: 2rem; text-align: center; }
        .profile-actions button {
            padding: 0.8rem 2rem; border-radius: 8px; font-size: 0.88rem;
            font-weight: 600; font-family: 'IBM Plex Sans', sans-serif;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-logout-full {
            background: transparent; color: var(--text-muted);
            border: 1px solid var(--border-light);
        }
        .btn-logout-full:hover { color: var(--error); border-color: var(--error); }

        .loading-state { text-align: center; padding: 4rem; color: var(--text-muted); font-size: 0.9rem; }

        footer { position: relative; z-index: 1; border-top: 1px solid var(--border); padding: 3rem 2rem; text-align: center; }
        .footer-name { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--teal-light); margin-bottom: 0.5rem; }
        .footer-text { font-size: 0.8rem; color: var(--text-muted); }
        .footer-text a { color: var(--text-dim); text-decoration: none; }
        .footer-text a:hover { color: var(--teal-light); }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            nav { padding: 0.75rem 1.25rem; }
            .nav-links { gap: 1rem; }
            .nav-links a { font-size: 0.75rem; }
            .container { padding: 0 1.25rem; }
            .page-header { padding: 7rem 1.5rem 1.5rem; }
        }
        @media (max-width: 480px) { .nav-links a:not(:last-child) { display: none; } }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <nav>
        <a href="index.html" class="nav-logo">Al-Jazari<span>Edu</span></a>
        <div class="nav-links">
            <a href="practice.html">Practice Lab</a>
            <a href="book.html">Book</a>
            <a href="plans.html">Plans</a>
            <a href="index.html#signup-section">Newsletter</a>
            <span id="navAuthArea">
                <a href="auth.html" class="nav-login">Log In</a>
            </span>
        </div>
    </nav>

    <section class="page-header">
        <span class="section-label">Account</span>
        <h1>My Profile</h1>
    </section>

    <section class="profile-section">
        <div class="container" id="profileContainer">
            <div class="loading-state">Loading your profile...</div>
        </div>
    </section>

    <footer>
        <div class="footer-name">Al-Jazari Education</div>
        <p class="footer-text">
            Reality first, tools second. &nbsp;·&nbsp;
            <a href="mailto:admin@aljazariedu.com">admin@aljazariedu.com</a>
        </p>
    </footer>

    <script type="module">
        import { onUserReady, updateUserProfile, auth } from './aje-auth.js';
        import { signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        onUserReady((user, profile) => {
            const container = document.getElementById('profileContainer');

            if (!user) {
                window.location.href = 'auth.html?redirect=profile.html';
                return;
            }

            const name = user.displayName || user.email.split('@')[0];
            const planClass = profile?.plan === 'pro' ? 'pro' : 'free';
            const planLabel = profile?.plan === 'pro' ? 'Pro' : 'Free';
            const upgradeHtml = profile?.plan !== 'pro'
                ? '<a href="plans.html#proRequestSection" class="upgrade-link">Upgrade to Pro →</a>'
                : '';
            const newsletterChecked = profile?.newsletter ? 'checked' : '';

            container.innerHTML = `
                <!-- Account Info -->
                <div class="profile-card">
                    <h3>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Account
                    </h3>
                    <div class="profile-row">
                        <span class="profile-row-label">Name</span>
                        <span class="profile-row-value">${escapeHtml(name)}</span>
                    </div>
                    <div class="profile-row">
                        <span class="profile-row-label">Email</span>
                        <span class="profile-row-value" style="color: var(--text-dim); font-weight: 300;">${escapeHtml(user.email)}</span>
                    </div>
                    <div class="profile-row">
                        <span class="profile-row-label">Member since</span>
                        <span class="profile-row-value" style="color: var(--text-dim); font-weight: 300; font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem;">
                            ${profile?.createdAt ? new Date(profile.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '—'}
                        </span>
                    </div>
                </div>

                <!-- Plan -->
                <div class="profile-card">
                    <h3>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                        Plan
                    </h3>
                    <div class="profile-row">
                        <span class="profile-row-label">Current plan</span>
                        <span class="profile-row-value">
                            <span class="plan-tag ${planClass}">${planLabel}</span>
                            ${upgradeHtml}
                        </span>
                    </div>
                </div>

                <!-- Newsletter -->
                <div class="profile-card">
                    <h3>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        Newsletter
                    </h3>
                    <div class="profile-row">
                        <span class="profile-row-label">Receive news & updates</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="newsletterToggle" ${newsletterChecked}>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <p style="font-size: 0.78rem; color: var(--text-muted); margin-top: 0.5rem; font-weight: 300;">
                        Engineering tips, book updates, and new content — no spam.
                    </p>
                </div>

                <!-- Actions -->
                <div class="profile-actions">
                    <button class="btn-logout-full" id="profileLogoutBtn">Log Out</button>
                </div>
            `;

            // Newsletter toggle
            document.getElementById('newsletterToggle').addEventListener('change', async (e) => {
                try {
                    await updateUserProfile({ newsletter: e.target.checked });
                } catch (err) {
                    console.error('Newsletter update failed:', err);
                    e.target.checked = !e.target.checked;
                }
            });

            // Logout
            document.getElementById('profileLogoutBtn').addEventListener('click', () => {
                signOut(auth).then(() => { window.location.href = 'index.html'; });
            });
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }
    </script>

    <script>
    (function() {
        const nav = document.querySelector('nav');
        let lastScrollY = window.scrollY;
        let ticking = false;
        function updateNav() {
            const currentScrollY = window.scrollY;
            if (currentScrollY > lastScrollY && currentScrollY > 60) { nav.classList.add('nav-hidden'); }
            else { nav.classList.remove('nav-hidden'); }
            lastScrollY = currentScrollY;
            ticking = false;
        }
        window.addEventListener('scroll', () => {
            if (!ticking) {
                requestAnimationFrame(updateNav);
                ticking = true;
            }
        }, { passive: true });
    })();
    </script>
</body>
</html>
